<title>TuliCard — podgląd</title>
<style>
  * { box-sizing: border-box; }
  html,body { margin:0; height:100%; }
  body { background:#E9E3D8; font-family: system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    display:grid; place-items:center; min-height:100vh; color:#172233; padding:24px; }
  .gate { width:100%; max-width:380px; background:#FFF7ED; border:1px solid #EBE2D5;
    border-radius:28px; padding:34px 28px; box-shadow:0 18px 50px -18px rgba(45,74,60,.22); text-align:center; }
  .dot { width:54px; height:54px; border-radius:16px; margin:0 auto 18px;
    background:linear-gradient(135deg,#7FC0B1,#289585); display:grid; place-items:center; color:#fff; font-weight:800; font-size:24px; }
  h1 { font-size:21px; margin:0 0 6px; letter-spacing:-.3px; }
  p { font-size:14px; color:#6B7480; margin:0 0 22px; line-height:1.5; }
  input { width:100%; height:54px; border:1.5px solid #EBE2D5; background:#fff; border-radius:16px;
    padding:0 16px; font-size:16px; font-family:inherit; color:#172233; outline:none; text-align:center; }
  input:focus { border-color:#289585; }
  button { width:100%; height:54px; margin-top:12px; border:none; border-radius:16px; cursor:pointer;
    background:#289585; color:#fff; font-size:16px; font-weight:700; font-family:inherit; }
  button:disabled { opacity:.6; cursor:default; }
  .err { color:#C84A3D; font-size:13.5px; margin-top:12px; min-height:18px; }
  .hint { color:#9aa0a8; font-size:12px; margin-top:16px; }
</style>
</head>

    <div class="err" id="e"></div>
    <div class="hint">Bez konta · działa offline po odblokowaniu</div>
  </form>

  return new TextDecoder().decode(buf);
}

const f=document.getElementById("g"), pw=document.getElementById("pw"),
      b=document.getElementById("b"), e=document.getElementById("e");
f.addEventListener("submit", async (ev)=>{
  ev.preventDefault(); e.textContent=""; b.disabled=true; b.textContent="Odblokowuję…";
  try{
    const html = await unlock(pw.value);
    document.open(); document.write(html); document.close();
  }catch(err){
    b.disabled=false; b.textContent="Otwórz";
    e.textContent="Nieprawidłowe hasło. Spróbuj ponownie.";
    pw.value=""; pw.focus();
  }
});
